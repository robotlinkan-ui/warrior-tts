<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox AI Studio TTS</title> <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505; /* Ekdum dark black background */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #auth-section {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }
        .studio-box {
            background-color: #111111; /* Darker box design */
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333; /* Premium look border */
            width: 100%;
            max-width: 600px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #0a0a0a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: none;
            outline: none;
        }
        .main-btn {
            background-color: #ffffff; /* White button like your photo */
            color: #000000;
            font-weight: bold;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
        }
        .btn-google { background-color: #4285F4; color: white; padding: 8px 15px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div id="auth-section">
        <span id="user-email" style="margin-right: 10px; font-size: 12px; color: #666;"></span>
        <button id="login-btn" class="btn-google" onclick="googleLogin()">Google Login</button>
        <button id="logout-btn" style="background:#f44336; color:white; display:none;" onclick="logout()">Logout</button>
    </div>

    <h1>🎙️ Vox AI Studio TTS</h1> <p style="color: #666;">Professional AI Voice Generator</p>

    <div class="studio-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size: 14px; font-weight:bold;">✨ Text to Speech</span>
            <span style="font-size: 12px; color:#666;">0 / 20000 CHARACTERS</span>
        </div>
        
        <textarea id="text-input" placeholder="Type or paste your text here..."></textarea>
        
        <button class="main-btn" onclick="speakText()">VoxAI Frank (Premium)</button>
    </div>

    <script src="auth.js"></script>
    <script>
        // Purana speakText logic yahan rahega...
    </script>
</body>
</html>
